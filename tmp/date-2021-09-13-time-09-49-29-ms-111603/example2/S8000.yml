apiVersion: v1
kind: Pod
metadata:
  name: example2
spec:
  containers:
  - name: s8000
    image: s8000:latest
    #IfNotPresent - Nesscary for Windows Docker Desktop Environment. Image is already there ;-)
    imagePullPolicy: IfNotPresent
  - name: robotframework
    image: robotframework:latest
    #IfNotPresent - Nesscary for Windows Docker Desktop Environment. Image is already there ;-)
    imagePullPolicy: IfNotPresent
    volumeMounts:
    - name: test
      mountPath: "/test"
      readOnly: true
    env:
    - name: TESTCASE
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
  volumes:
  - name: test
    configMap:
      name: example2
  restartPolicy: Never
